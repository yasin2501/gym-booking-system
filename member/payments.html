<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Payments — IronCore Fitness</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../assets/css/main.css" />
  <link rel="stylesheet" href="./css/member.css" />
</head>
<body>
  <div class="dashboard-shell">
    <aside class="sidebar">
      <div class="sidebar-brand">
        <h1>IronCore Fitness</h1>
        <small>Member Portal</small>
      </div>
      <nav class="sidebar-nav">
        <a data-nav="dashboard" href="./dashboard.html">Dashboard</a>
        <a data-nav="classes" href="./classes.html">View Classes</a>
        <a data-nav="bookings" href="./bookings.html">My Bookings</a>
        <a data-nav="payments" href="./payments.html">Payments</a>
        <a data-nav="profile" href="./profile.html">Profile</a>
      </nav>
      <div class="sidebar-footer">
        <button data-logout>Sign Out</button>
      </div>
    </aside>

    <div class="page-content">
      <header class="topbar card" style="display:none;">
        <div>
          <div class="brand">My Payments</div>
          <small><span data-user-name>Member</span></small>
        </div>
        <nav class="nav">
          <a data-nav="dashboard" href="./dashboard.html">Dashboard</a>
          <a data-nav="classes" href="./classes.html">View Classes</a>
          <a data-nav="bookings" href="./bookings.html">My Bookings</a>
          <a data-nav="payments" href="./payments.html">Payments</a>
          <a data-nav="profile" href="./profile.html">Profile</a>
          <button data-logout>Logout</button>
        </nav>
      </header>

      <div class="page-header">
        <h1>Payments</h1>
        <p>Manage your pending payments and view transaction history.</p>
      </div>

      <section class="grid two">
        <article class="card">
          <h2>Pending Payments</h2>
          <div id="message"></div>
          <div id="pendingList" class="list"></div>
        </article>
        <article class="card">
          <h2>Payment History</h2>
          <div id="paymentList" class="list"></div>
        </article>
      </section>

      <section class="card" id="checkoutPanel" style="margin-top: 20px; display: none;">
        <h2>Checkout</h2>
        <p id="checkoutSummary"></p>
        <form id="checkoutForm" class="grid two">
          <div>
            <label>Payment Method</label>
            <select name="payment_method" required>
              <option value="credit_card">Credit Card</option>
              <option value="debit_card">Debit Card</option>
              <option value="paypal">PayPal</option>
              <option value="bank_transfer">Bank Transfer</option>
              <option value="cash">Cash</option>
            </select>
          </div>
          <div>
            <label>Billing Name</label>
            <input name="billing_name" placeholder="Cardholder / Account Name" required />
          </div>

          <div data-method-group="card">
            <label>Card Number</label>
            <input name="card_number" inputmode="numeric" placeholder="16-digit card number" />
          </div>
          <div data-method-group="card" class="row">
            <div style="flex: 1 1 120px;">
              <label>Expiry</label>
              <input name="card_expiry" placeholder="MM/YY" />
            </div>
            <div style="flex: 1 1 120px;">
              <label>CVV</label>
              <input name="card_cvv" inputmode="numeric" placeholder="3-4 digits" />
            </div>
          </div>

          <div data-method-group="paypal" style="display:none;">
            <label>PayPal Email</label>
            <input name="paypal_email" type="email" placeholder="payer@example.com" />
          </div>

          <div data-method-group="bank_transfer" style="display:none;">
            <label>Bank Reference</label>
            <input name="bank_reference" placeholder="Transfer reference number" />
          </div>

          <div data-method-group="cash" style="display:none;">
            <label>Cash Note</label>
            <input name="cash_note" placeholder="Payment at counter" />
          </div>

          <div style="grid-column: 1 / -1;" class="row">
            <button type="submit">Confirm Payment</button>
            <button type="button" class="secondary" id="cancelCheckout">Cancel</button>
          </div>
        </form>
      </section>
    </div>
  </div>
  <script type="module" src="./js/payments.js"></script>
</body>
</html>
