<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Trainer Login — IronCore Fitness</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../assets/css/main.css" />
  <link rel="stylesheet" href="./css/trainer.css" />
</head>
<body>
  <div class="auth-page">
    <div class="auth-card">
      <h1>Trainer Login</h1>
      <p>Sign in to manage your classes and participants.</p>
      <div id="message"></div>
      <form id="loginForm">
        <div>
          <label>Email Address</label>
          <input type="email" name="email" placeholder="trainer@ironcore.com" required />
        </div>
        <div>
          <label>Password</label>
          <input type="password" name="password" placeholder="Enter your password" required />
        </div>
        <button type="submit">Sign In</button>
      </form>
      <div class="auth-footer">
        <a href="../index.html">← Back to portal selection</a>
      </div>
    </div>
  </div>
  <script type="module" src="./js/login.js"></script>
</body>
</html>
