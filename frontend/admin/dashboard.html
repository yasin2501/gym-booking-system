<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Dashboard — IronCore Fitness</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="../assets/css/main.css" />
  <link rel="stylesheet" href="./css/admin.css" />
</head>

<body>
  <div class="dashboard-shell">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-brand">
        <h1>IronCore Fitness</h1>
        <small>Admin Panel</small>
      </div>
      <nav class="sidebar-nav">
        <a data-nav="dashboard" href="./dashboard.html">
          Dashboard
        </a>
        <a data-nav="users" href="./users.html">
          Users
        </a>
        <a data-nav="trainers" href="./trainers.html">
          Trainers
        </a>
        <a data-nav="classes" href="./classes.html">
          Classes
        </a>
        <a data-nav="bookings" href="./bookings.html">
          Bookings
        </a>
        <a data-nav="payments" href="./payments.html">
          Payments
        </a>
      </nav>
      <div class="sidebar-footer">
        <button data-logout>
          Sign Out
        </button>
      </div>
    </aside>

    <!-- Main Content -->
    <div class="page-content">
      <header class="topbar card" style="display:none;">
        <div>
          <div class="brand">Admin Dashboard</div>
          <small>Welcome, <span data-user-name>Admin</span></small>
        </div>
        <nav class="nav">
          <a data-nav="dashboard" href="./dashboard.html">Dashboard</a>
          <a data-nav="users" href="./users.html">Users</a>
          <a data-nav="trainers" href="./trainers.html">Trainers</a>
          <a data-nav="classes" href="./classes.html">Classes</a>
          <a data-nav="bookings" href="./bookings.html">Bookings</a>
          <a data-nav="payments" href="./payments.html">Payments</a>
          <button data-logout>Logout</button>
        </nav>
      </header>

      <div class="page-header">
        <h1>Dashboard</h1>
        <p>Welcome back, <span data-user-name>Admin</span>. Here's your system overview.</p>
      </div>

      <section class="card">
        <h2>System Summary</h2>
        <div id="summary" class="list"></div>
      </section>
    </div>
  </div>
  <script type="module" src="./js/dashboard.js"></script>
</body>

</html>
